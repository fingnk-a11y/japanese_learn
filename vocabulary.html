<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NM | Vocabulary Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="gallery.css">
</head>
<body>
    <header class="hero">
        <div class="hero-nav-row">
            <a href="index.html" class="back-btn-styled">Back</a>
            <div class="nav-right">
                <button id="theme-toggle" class="flag-btn theme-btn" onclick="toggleTheme()">
                    <span id="theme-icon">🌙</span>
                </button>
                <button id="lang-toggle" class="flag-btn" onclick="toggleLanguage()">
                    <img id="flag-img" src="assets/flags/tm.png" alt="Switch Language">
                </button>
                <button class="menu-trigger" onclick="toggleMenu()">MENU ☰</button>
            </div>
        </div>

        <div class="hero-main">
            <h1>Vocabulary Hub</h1>
            <p>Select a category to start master Japanese words.</p>
        </div>

       <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="global-search" placeholder="Search categories..." oninput="executeSearch()">
    <button id="clear-search" onclick="clearSearch()">×</button>
</div>
    </header>

    <div class="menu-grid" id="category-menu"></div>

   <script src="app.js"></script>
<script src="vocabulary.js"></script>
<div id="vocab-modal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeVocabModal()">&times;</span>

        <img id="modal-img" src="" alt="Vocabulary Image">
        <h2 id="modal-jp" class="large-kana"></h2>
        <p id="modal-en" class="en-meaning"></p>

        <button class="sound-trigger" onclick="playVocabSound()">
            🔊 Hear Sound
        </button>
    </div>
</div>
</body>
</html>
