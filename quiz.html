<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Quiz | Nihongo Master</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="quiz.css">
</head>
<body>

<header class="hero">
    <div class="hero-nav-row">
        <a href="index.html" class="back-btn-styled">Back</a>
        <a href="index.html" class="logo-text">🇯🇵 NM</a>
        <div class="nav-right">
            <button id="theme-toggle" class="flag-btn theme-btn" onclick="toggleTheme()">
                <span id="theme-icon">🌙</span>
            </button>
            <button id="lang-toggle" class="flag-btn" onclick="toggleLanguage()">
                <img id="flag-img" src="assets/flags/tm.png" alt="Switch Language">
            </button>
            <button class="menu-trigger" onclick="toggleMenu()">MENU ☰</button>
        </div>
    </div>
    <div class="hero-main">
        <h1 id="quiz-title">Flash Quiz</h1>
        <p id="quiz-subtitle">Test your knowledge and track your progress.</p>
    </div>
</header>

<main class="main-container">

    <!-- Quiz Type Selection Screen -->
    <div id="quiz-menu" class="quiz-screen active">
        <h2 id="select-category">Select a Category</h2>
        <div class="menu-grid">
            <button class="menu-item quiz-category-btn" onclick="startQuiz('vocabulary')">
                <div class="item-icon-circle red-bg">📖</div>
                <div class="item-text"><span class="en">Vocabulary</span></div>
            </button>
            <button class="menu-item quiz-category-btn" onclick="startQuiz('kanji')">
                <div class="item-icon-circle red-bg">⛩️</div>
                <div class="item-text"><span class="en">Kanji</span></div>
            </button>
            <button class="menu-item quiz-category-btn" onclick="startQuiz('grammar')">
                <div class="item-icon-circle red-bg">⚖️</div>
                <div class="item-text"><span class="en">Grammar</span></div>
            </button>
            <button class="menu-item quiz-category-btn" onclick="startQuiz('kana')">
                <div class="item-icon-circle blue-bg">あ</div>
                <div class="item-text"><span class="en">Kana</span></div>
            </button>
        </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-content" class="quiz-screen">
        <div class="quiz-header">
            <div class="quiz-progress">
                <span id="question-counter">1/10</span>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>
            <button class="quiz-exit-btn" onclick="exitQuiz()">✕</button>
        </div>

        <div class="quiz-question-box">
            <div class="quiz-question" id="quiz-question">
                Which is correct?
            </div>
            <div class="quiz-subtext" id="quiz-subtext"></div>
        </div>

        <div class="quiz-answers" id="quiz-answers">
            <!-- Answers will be populated dynamically -->
        </div>

        <div class="quiz-footer">
            <button class="quiz-btn-secondary" id="skip-btn" onclick="skipQuestion()">Skip</button>
            <button class="quiz-btn-primary" id="submit-btn" onclick="submitAnswer()" style="display:none;">Submit</button>
        </div>
    </div>

    <!-- Results Screen -->
    <div id="quiz-results" class="quiz-screen">
        <div class="results-container">
            <h2 id="results-title">Quiz Complete!</h2>
            <div class="results-score">
                <div class="score-circle">
                    <span id="final-score">0%</span>
                </div>
            </div>
            <div class="results-stats">
                <div class="stat-item">
                    <span class="stat-label" id="correct-label">Correct:</span>
                    <span class="stat-value" id="correct-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label" id="incorrect-label">Incorrect:</span>
                    <span class="stat-value" id="incorrect-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label" id="skipped-label">Skipped:</span>
                    <span class="stat-value" id="skipped-count">0</span>
                </div>
            </div>
            <div class="results-buttons">
                <button class="quiz-btn-primary" onclick="retakeQuiz()">Retake Quiz</button>
                <button class="quiz-btn-secondary" onclick="selectCategory()">New Category</button>
                <a href="index.html" class="quiz-btn-secondary" style="text-decoration: none; display: inline-block;">Return Home</a>
            </div>
        </div>
    </div>

</main>

<script src="app.js"></script>
<script src="quiz.js"></script>

</body>
</html>
