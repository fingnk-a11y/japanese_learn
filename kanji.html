<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihongo Master | Kanji</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="kanji.css">
    <link rel="stylesheet" href="gallery.css">
</head>
<body>

  <header class="hero">
    <div class="hero-nav-row">
        <a href="index.html" class="back-btn-styled">Back</a>
        <div class="nav-right">
            <button id="theme-toggle" class="flag-btn theme-btn" onclick="toggleTheme()">
                <span id="theme-icon">🌙</span>
            </button>
            <button id="lang-toggle" class="flag-btn" onclick="toggleLanguage()">
                <img id="flag-img" src="assets/flags/tm.png" alt="Switch Language">
            </button>
            <button class="menu-trigger" onclick="toggleMenu()">MENU ☰</button>
        </div>
    </div>

    <div class="hero-main">
        <h1>Kanji Master</h1>
        <p>Select your JLPT level to begin.</p>

        <div class="search-wrapper">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="global-search" placeholder="Search..." oninput="executeSearch()">
                <button id="clear-search" onclick="clearSearch()">×</button>
            </div>
        </div>

        <div class="kana-tabs hero-tabs">
            <button class="tab-btn" onclick="switchKanji('n5', this)">N5</button>
            <button class="tab-btn" onclick="switchKanji('n4', this)">N4</button>
            <button class="tab-btn" onclick="switchKanji('n3', this)">N3</button>
            <button class="tab-btn" onclick="switchKanji('n2', this)">N2</button>
            <button class="tab-btn" onclick="switchKanji('n1', this)">N1</button>
        </div>
    </div>
</header>



    <main class="main-container">


        <div id="kanji-grid" class="kana-grid">
            </div>
    </main>

    <div id="kanji-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal">&times;</span>

            <div class="kanji-info-header">
                <img id="kanji-stroke" src="" alt="Stroke Order">
                <div id="modal-kanji-main" class="large-kana"></div>
                <h2 id="modal-meaning"></h2>
            </div>

            <div class="readings-box">
                <div>
                    <span class="reading-label">Onyomi</span>
                    <div id="modal-onyomi" class="reading-value"></div>
                </div>
                <div>
                    <span class="reading-label">Kunyomi</span>
                    <div id="modal-kunyomi" class="reading-value"></div>
                </div>
            </div>

            <div class="examples-container">
                <h4>Example Vocabulary</h4>
                <ul id="modal-examples">
                    </ul>
            </div>
        </div>
    </div>
<script src="app.js"></script>
<script src="kanji.js"></script>

</body>
</html>
