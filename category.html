<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Japanese | Category</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="gallery.css">
</head>
<body>
    <header class="hero">
    <div class="hero-nav-row">
        <a href="vocabulary.html" class="back-btn-styled">Back</a>
        <div class="nav-right">
            <button id="theme-toggle" class="flag-btn theme-btn" onclick="toggleTheme()">
                <span id="theme-icon">🌙</span>
            </button>
            <button id="lang-toggle" class="flag-btn" onclick="toggleLanguage()">
                <img id="flag-img" src="assets/flags/tm.png" alt="Switch Language">
            </button>
            <button class="menu-trigger" onclick="toggleMenu()">MENU ☰</button>
        </div>
    </div>

    <div class="hero-main">
        <h1 id="category-title">Animals</h1>
        <p id="category-desc">Improve your japanese vocabulary.</p>
    </div>

    <div class="search-container">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input
                type="text"
                class="main-search"
                id="wordSearch"
                placeholder="Search English or Japanese..."
                onkeyup="filterWords()"
            >
        </div>
    </div>
</header>

    <main>
        <div id="vocab-grid" class="vocab-grid">
            </div>
    </main>

    <!-- modal used by the cards -->
    <div id="card-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <img id="modal-img" src="" alt="">
            <h2 id="modal-jp" class="jp"></h2>
            <p id="modal-romaji" class="romaji"></p>
            <p id="modal-en" class="en"></p>

            <button id="sound-btn" class="sound-trigger">
                <span>🔊 Play Sound</span>
            </button>
        </div>
    </div>

    <!-- scripts -->
    <script src="app.js"></script>
    <script src="category.js"></script>
    <script src="search.js"></script>
</body>
</html>
